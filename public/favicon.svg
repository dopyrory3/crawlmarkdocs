<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Indigo background tile -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Equator rule -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left tick -->
  <line x1="10" y1="13.5" x2="10" y2="18.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right tick -->
  <line x1="22" y1="13.5" x2="22" y2="18.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="2.4" fill="white"/>
  <!-- Top compass point -->
  <line x1="16" y1="2" x2="16" y2="5.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Bottom compass point -->
  <line x1="16" y1="26.5" x2="16" y2="30" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
